<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAC — Gestão de Inventário</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#C0392B; --red-l:#FADBD8;
  --green:#1A7A4A; --green-l:#D5F5E3;
  --amber:#D68910; --amber-l:#FEF9E7;
  --g0:#FAFAFA; --g1:#F2F2F2; --g2:#E0E0E0; --g3:#BDBDBD;
  --g4:#757575; --g5:#424242; --g6:#1A1A1A;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --r:8px; --rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--g0);color:var(--g6);font-size:14px;min-height:100vh}

.topbar{background:var(--g6);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:32px;height:32px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center}
.tb-logo svg{width:18px;height:18px;fill:white}
.tb-title{font-size:15px;font-weight:600;color:white;letter-spacing:.02em}
.tb-sub{font-size:11px;color:var(--g3);text-transform:uppercase;letter-spacing:.08em}
.tb-right{display:flex;align-items:center;gap:12px}
.fb-ind{font-size:12px;color:var(--g3);display:flex;align-items:center;gap:6px}
.fb-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block;flex-shrink:0}

.content{max-width:1240px;margin:0 auto;padding:2rem}
.layout{display:grid;grid-template-columns:260px 1fr;gap:1.5rem;align-items:start}

.sidebar{background:white;border-radius:var(--rl);border:1px solid var(--g2);overflow:hidden;position:sticky;top:72px}
.sb-header{padding:1rem 1.25rem;border-bottom:1px solid var(--g1);display:flex;align-items:center;justify-content:space-between}
.sb-header h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--g4)}
.btn-sync{padding:5px 10px;background:var(--g6);color:white;border:none;border-radius:5px;font-size:11px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-sync:hover{background:var(--red)}
.btn-sync.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.store-item{padding:10px 1.25rem;display:flex;align-items:center;gap:10px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.store-item:hover{background:var(--g0)}
.store-item.active{background:var(--red-l);border-left-color:var(--red)}
.store-dot{width:8px;height:8px;border-radius:50%;background:var(--g3);flex-shrink:0}
.store-item.active .store-dot{background:var(--red)}
.store-info{flex:1;min-width:0}
.store-code{font-size:11px;font-family:var(--mono);font-weight:500;color:var(--g4)}
.store-name{font-size:13px;font-weight:500;color:var(--g6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-item.active .store-code,.store-item.active .store-name{color:var(--red)}
.pac-badge{font-size:11px;background:var(--g1);color:var(--g4);border-radius:10px;padding:2px 7px;font-family:var(--mono)}
.store-item.active .pac-badge{background:var(--red-l);color:var(--red)}
.progress-pill{height:4px;background:var(--g1);border-radius:2px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

.page-title{margin-bottom:1.5rem}
.page-title h1{font-size:22px;font-weight:600;color:var(--g6)}
.page-title p{font-size:13px;color:var(--g4);margin-top:3px}

.kpi-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:1.5rem}
.kpi{background:white;border:1px solid var(--g2);border-radius:var(--r);padding:14px 16px}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--g4);font-weight:600;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:600;color:var(--g6);font-family:var(--mono);line-height:1.1}
.kpi-value.red{color:var(--red)}.kpi-value.green{color:var(--green)}.kpi-value.amber{color:var(--amber)}
.kpi-sub{font-size:11px;color:var(--g3);margin-top:3px}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.toolbar-left{font-size:13px;color:var(--g4)}
.status-row{display:flex;align-items:center;gap:6px;font-size:12px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-red{background:var(--red)}.dot-green{background:var(--green)}.dot-amber{background:var(--amber)}
.btn-group{display:flex;gap:8px}
.btn-outline{padding:7px 14px;border:1.5px solid var(--g2);border-radius:var(--r);background:white;font-family:var(--font);font-size:13px;font-weight:500;color:var(--g5);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-outline:hover{border-color:var(--g4)}
.btn-red{padding:7px 14px;border:none;border-radius:var(--r);background:var(--red);font-family:var(--font);font-size:13px;font-weight:500;color:white;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-red:hover{background:#a93226}

.pac-card{background:white;border-radius:var(--rl);border:1px solid var(--g2);overflow:hidden;margin-bottom:1rem}
.pac-header{padding:1rem 1.25rem;border-bottom:1px solid var(--g1);display:flex;align-items:center;justify-content:space-between}
.pac-header h2{font-size:15px;font-weight:600;color:var(--g6)}
.pac-header p{font-size:12px;color:var(--g4);margin-top:2px}
.stat-chip{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;font-family:var(--mono)}
.stat-chip.sobra{background:#E8F5E9;color:#1B5E20}
.stat-chip.falta{background:var(--red-l);color:var(--red)}

.art-table{width:100%;border-collapse:collapse}
.art-table th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--g4);padding:10px 12px;text-align:left;background:var(--g0);border-bottom:1px solid var(--g2)}
.art-table td{padding:10px 12px;border-bottom:1px solid var(--g1);vertical-align:top}
.art-table tr:last-child td{border-bottom:none}
.art-table tr:hover td{background:var(--g0)}
.art-code{font-family:var(--mono);font-size:12px;color:var(--g4)}
.art-name{font-size:13px;font-weight:500;color:var(--g6)}
.qty-badge{font-family:var(--mono);font-size:12px;font-weight:500;padding:2px 8px;border-radius:5px;display:inline-block}
.qty-pos{background:#E8F5E9;color:#1B5E20}.qty-neg{background:var(--red-l);color:var(--red)}
.val-cell{font-family:var(--mono);font-size:12px;color:var(--g5)}
.just-cell{min-width:220px}
.just-textarea{width:100%;padding:5px 8px;border:1.5px solid var(--g2);border-radius:6px;font-family:var(--font);font-size:12px;color:var(--g6);resize:none;outline:none;line-height:1.4}
.just-textarea:focus{border-color:var(--red)}
.just-textarea::placeholder{color:var(--g3)}
.btn-save-row{margin-top:5px;padding:4px 12px;background:var(--g6);color:white;border:none;border-radius:5px;font-size:11px;font-family:var(--font);font-weight:500;cursor:pointer}
.btn-save-row:hover{background:var(--red)}
.btn-save-row:disabled{opacity:.5;cursor:default}
.saved-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--green);font-weight:500;margin-top:5px;margin-left:8px}
.saved-tag svg{width:13px;height:13px}

.sync-panel{background:white;border-radius:var(--rl);border:1px solid var(--g2);padding:1.5rem;margin-bottom:1.5rem}
.sync-panel h2{font-size:15px;font-weight:600;margin-bottom:4px}
.sync-panel p{font-size:13px;color:var(--g4);margin-bottom:1rem}
.sync-files{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.sync-file{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--g2);border-radius:var(--r);font-size:13px}
.sync-file-name{flex:1;font-weight:500}
.sync-file-status{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:4px}
.sf-pending{background:var(--g1);color:var(--g4)}
.sf-processing{background:var(--amber-l);color:var(--amber)}
.sf-done{background:var(--green-l);color:var(--green)}
.sf-error{background:var(--red-l);color:var(--red)}
.sync-log{font-family:var(--mono);font-size:11px;color:var(--g4);background:var(--g1);border-radius:var(--r);padding:10px 12px;max-height:160px;overflow-y:auto;line-height:1.8;white-space:pre-wrap}

.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.ov-card{background:white;border:1px solid var(--g2);border-radius:var(--rl);padding:1.25rem;cursor:pointer;transition:border-color .15s}
.ov-card:hover{border-color:var(--red)}
.ov-code{font-size:11px;font-family:var(--mono);color:var(--g4)}
.ov-name{font-size:14px;font-weight:600;color:var(--g6);margin-top:2px}
.ov-meta{font-size:12px;color:var(--g4);margin-top:2px;margin-bottom:10px}
.ov-kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ov-kpi{background:var(--g0);border-radius:6px;padding:8px 10px}
.ov-kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--g4);font-weight:600}
.ov-kpi-val{font-size:18px;font-weight:600;font-family:var(--mono);margin-top:2px}
.ov-kpi-val.red{color:var(--red)}.ov-kpi-val.green{color:var(--green)}

.empty{padding:3rem 2rem;text-align:center;color:var(--g3)}
.empty h3{font-size:15px;font-weight:500;margin-bottom:6px}
.empty p{font-size:13px}
.alert{border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px}
.alert-warn{background:var(--amber-l);border:1px solid #F9E79F;color:#7D6608}

@media(max-width:1100px){.kpi-bar{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.layout{grid-template-columns:1fr}.kpi-bar{grid-template-columns:repeat(2,1fr)}.sidebar{position:static}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22" style="fill:none;stroke:white;stroke-width:1.5"/></svg>
    </div>
    <div>
      <div class="tb-title">PAC Inventário</div>
      <div class="tb-sub">Resultado Provisório para Aprovação</div>
    </div>
  </div>
  <div class="tb-right">
    <div class="fb-ind">
      <span class="fb-dot" id="fb-dot"></span>
      <span id="fb-label">A ligar...</span>
    </div>
  </div>
</div>

<div class="content">
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="sb-header">
        <h3>Lojas / PACs</h3>
        <button class="btn-sync" id="btn-sync" onclick="startSync()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Sincronizar
        </button>
      </div>
      <div id="sidebar-list"></div>
    </div>

    <div id="main-area">
      <div class="page-title">
        <h1 id="main-title">Painel Central</h1>
        <p id="main-sub">A carregar dados...</p>
      </div>
      <div id="sync-area"></div>
      <div id="pac-list-area"></div>
    </div>
  </div>
</div>

<script type="module">
// ══════════════════════════════════════════════════
//  ⚙️  CONFIG — preencha os 2 valores em falta
// ══════════════════════════════════════════════════

// ID da pasta do Google Drive (ver guia GDRIVE.md)
// Abra a pasta no browser → copie o ID do URL:
// drive.google.com/drive/folders/→ ESTE_ID ←
const GDRIVE_FOLDER_ID = "1e9O05-r7kg9khbuowhD2jYQfsBva12l5";

// API Key do Google
const GDRIVE_API_KEY = "AIzaSyDbTGBdxi27pnYebaBNccUsWUDkUobHr3k";

// Firebase — já configurado
const FB_CONFIG = {
  apiKey:            "AIzaSyD8jLPwMuhNl_eIn4L_X4vRTAn4iCKIrEE",
  authDomain:        "pacs-7465c.firebaseapp.com",
  projectId:         "pacs-7465c",
  storageBucket:     "pacs-7465c.firebasestorage.app",
  messagingSenderId: "749451051850",
  appId:             "1:749451051850:web:ff17bb1e15369a41ff77b3"
};

// ══════════════════════════════════════════════════
//  FIREBASE
// ══════════════════════════════════════════════════
import { initializeApp }                   from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc,
         collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const fbApp = initializeApp(FB_CONFIG);
const db    = getFirestore(fbApp);

let pacData        = {};
let justifications = {};
let currentStore   = null;

async function initFirebase() {
  try {
    const snap = await getDocs(collection(db, 'lojas'));
    snap.forEach(d => { pacData[d.id] = d.data(); });
    document.getElementById('fb-dot').style.background = 'var(--green)';
    document.getElementById('fb-label').textContent    = 'Firebase ligado';
  } catch(e) {
    document.getElementById('fb-dot').style.background = 'var(--red)';
    document.getElementById('fb-label').textContent    = 'Erro Firebase';
    console.error('Firebase:', e);
  }
  // justificações em tempo real
  onSnapshot(collection(db, 'justificacoes'), snap => {
    snap.forEach(d => { justifications[d.id] = d.data(); });
    buildSidebar();
    if (currentStore) refreshKpiBar(currentStore);
  });
  buildSidebar();
  buildOverview();
  const n = Object.keys(pacData).length;
  document.getElementById('main-sub').textContent =
    n > 0 ? `${n} loja(s) carregada(s)` : 'Clique em "Sincronizar" para importar as imagens PAC';
}

async function saveJustification(store, type, mat, note) {
  const key  = `${store}__${type}__${mat}`;
  const data = { store, type, mat, note, savedAt: new Date().toISOString() };
  justifications[key] = data;
  await setDoc(doc(db, 'justificacoes', key), data);
}

function getJust(s, t, m) { return justifications[`${s}__${t}__${m}`] || null; }

// ══════════════════════════════════════════════════
//  GOOGLE DRIVE
// ══════════════════════════════════════════════════
async function listDriveImages() {
  const q   = encodeURIComponent(`'${GDRIVE_FOLDER_ID}' in parents and mimeType contains 'image/' and trashed=false`);
  const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,mimeType)&pageSize=100&key=${GDRIVE_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erro ${res.status}`);
  }
  return (await res.json()).files || [];
}

async function downloadDriveImage(fileId) {
  const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${GDRIVE_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Download falhou: ${res.status}`);
  return res.arrayBuffer();
}

// ══════════════════════════════════════════════════
//  CLAUDE — extracção de dados da imagem
// ══════════════════════════════════════════════════
async function extractPacFromImage(bytes, mimeType) {
  const uint8 = new Uint8Array(bytes);
  let bin = '';
  for (let i = 0; i < uint8.length; i++) bin += String.fromCharCode(uint8[i]);
  const b64 = btoa(bin);

  const prompt = `Analisa esta imagem de um PAC (Resultado Provisório para Aprovação) de inventário de loja.
Devolve APENAS JSON válido sem markdown nem texto adicional, com este formato exacto:

{
  "centro": "ex: A188",
  "loja": "nome da loja",
  "pacDate": "dd/mm/aa",
  "gerente": "nome",
  "supervisor": "nome",
  "totalVendas": número,
  "resultadoInv": número negativo,
  "percentResult": número ex -1.01,
  "quebrasConhecidas": número negativo,
  "percentQC": número,
  "quebraTotal": número negativo,
  "percentQT": número,
  "ifsAnterior": inteiro,
  "ifsAtual": inteiro,
  "sobras": [{"mat":"código","desc":"descrição","qty":positivo,"valAtual":número,"valAnterior":número ou null}],
  "faltas":  [{"mat":"código","desc":"descrição","qty":negativo,"valAtual":negativo,"valAnterior":número ou null}]
}

Inclui todos os artigos de ambas as tabelas. Para valAnterior usa null se aparecer "NE", "-" ou vazio.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      messages: [{ role: "user", content: [
        { type: "image", source: { type: "base64", media_type: mimeType, data: b64 } },
        { type: "text",  text: prompt }
      ]}]
    })
  });

  if (!res.ok) throw new Error(`Claude API: ${res.status}`);
  const data = await res.json();
  const text = data.content?.[0]?.text || '';
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

// ══════════════════════════════════════════════════
//  SYNC
// ══════════════════════════════════════════════════
window.startSync = async function() {
  const btn = document.getElementById('btn-sync');
  btn.classList.add('spinning');

  document.getElementById('sync-area').innerHTML = `
    <div class="sync-panel">
      <h2>🔄 Sincronização Google Drive</h2>
      <p>A ler imagens da pasta configurada...</p>
      <div class="sync-files" id="sync-files"></div>
      <div class="sync-log" id="sync-log">A ligar ao Google Drive...</div>
    </div>`;

  const log = msg => {
    const el = document.getElementById('sync-log');
    if (el) { el.textContent += '\n' + msg; el.scrollTop = el.scrollHeight; }
  };

  try {
    if (GDRIVE_FOLDER_ID === 'COLE_AQUI_ID_DA_PASTA' || GDRIVE_API_KEY === 'COLE_AQUI_GOOGLE_API_KEY') {
      log('⚠️  Configure GDRIVE_FOLDER_ID e GDRIVE_API_KEY no ficheiro HTML.\nConsulte o guia GDRIVE.md.');
      btn.classList.remove('spinning'); return;
    }

    log('📂 A listar imagens...');
    const files = await listDriveImages();

    if (files.length === 0) {
      log('⚠️  Nenhuma imagem encontrada.\nVerifique:\n  1. O ID da pasta está correcto\n  2. A pasta está partilhada como "Qualquer pessoa com o link"\n  3. A API Key tem a Drive API activada');
      btn.classList.remove('spinning'); return;
    }
    log(`✅ ${files.length} imagem(ns) encontrada(s)`);

    const filesEl = document.getElementById('sync-files');
    files.forEach(f => {
      filesEl.innerHTML += `<div class="sync-file" id="sf-${f.id}">
        <span>🖼️</span>
        <span class="sync-file-name">${f.name}</span>
        <span class="sync-file-status sf-pending" id="sfs-${f.id}">Pendente</span>
      </div>`;
    });

    for (const file of files) {
      const st = document.getElementById(`sfs-${file.id}`);
      if (st) { st.textContent = 'A processar...'; st.className = 'sync-file-status sf-processing'; }
      log(`\n🔍 ${file.name}`);
      try {
        log('   📥 A descarregar...');
        const bytes = await downloadDriveImage(file.id);
        log(`   ✓  ${Math.round(bytes.byteLength/1024)} KB`);
        log('   🤖 A extrair dados com IA...');
        const mime = file.mimeType || 'image/png';
        const pac  = await extractPacFromImage(bytes, mime);
        const sid  = pac.centro;
        if (!sid) throw new Error('Campo "centro" não encontrado');
        pacData[sid] = pac;
        await setDoc(doc(db, 'lojas', sid), pac);
        log(`   ✅ Guardado: ${sid} — ${pac.loja}`);
        if (st) { st.textContent = `✓ ${sid}`; st.className = 'sync-file-status sf-done'; }
      } catch(e) {
        log(`   ❌ Erro: ${e.message}`);
        if (st) { st.textContent = 'Erro'; st.className = 'sync-file-status sf-error'; }
      }
    }

    log('\n🎉 Sincronização concluída!');
    buildSidebar();
    buildOverview();
    document.getElementById('main-sub').textContent = `${Object.keys(pacData).length} loja(s) carregada(s)`;

  } catch(e) {
    log(`❌ Erro: ${e.message}`);
    console.error(e);
  }
  btn.classList.remove('spinning');
};

// ══════════════════════════════════════════════════
//  UI
// ══════════════════════════════════════════════════
function fmt(v) {
  if (v === null || v === undefined) return 'NE';
  return new Intl.NumberFormat('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
}

function countDone(sid) {
  const d = pacData[sid]; if (!d) return 0;
  return [...(d.sobras||[]).map(i=>({...i,t:'sobra'})), ...(d.faltas||[]).map(i=>({...i,t:'falta'}))]
    .filter(i => { const j=getJust(sid,i.t,i.mat); return j&&j.note&&j.note.trim(); }).length;
}

function buildSidebar() {
  const list = document.getElementById('sidebar-list'); if (!list) return;
  list.innerHTML = '';
  Object.keys(pacData).sort().forEach(sid => {
    const d     = pacData[sid];
    const total = (d.sobras||[]).length + (d.faltas||[]).length;
    const done  = countDone(sid);
    const pct   = total > 0 ? Math.round((done/total)*100) : 0;
    const el    = document.createElement('div');
    el.className = 'store-item' + (currentStore===sid?' active':'');
    el.id = 'sidebar-' + sid;
    el.innerHTML = `
      <div class="store-dot"></div>
      <div class="store-info">
        <div class="store-code">${sid}</div>
        <div class="store-name">${d.loja||sid}</div>
        <div class="progress-pill"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <span class="pac-badge">${done}/${total}</span>`;
    el.onclick = () => selectStore(sid);
    list.appendChild(el);
  });
}

function buildOverview() {
  const area   = document.getElementById('pac-list-area'); if (!area) return;
  const stores = Object.keys(pacData).sort();
  if (stores.length === 0) {
    area.innerHTML = `<div class="empty"><h3>Sem dados</h3><p>Clique em "Sincronizar" para importar as imagens PAC do Google Drive</p></div>`;
    return;
  }
  document.getElementById('sync-area').innerHTML = '';
  area.innerHTML = '<div class="overview-grid">' + stores.map(sid => {
    const d      = pacData[sid];
    const total  = (d.sobras||[]).length + (d.faltas||[]).length;
    const done   = countDone(sid);
    const pct    = total > 0 ? Math.round((done/total)*100) : 0;
    const ifsDown = (d.ifsAtual||0) < (d.ifsAnterior||0);
    return `<div class="ov-card" onclick="selectStore('${sid}')">
      <div class="ov-code">${sid}</div>
      <div class="ov-name">${d.loja||sid}</div>
      <div class="ov-meta">PAC ${d.pacDate||'—'} · ${d.gerente||'—'}</div>
      <div class="ov-kpis">
        <div class="ov-kpi"><div class="ov-kpi-label">Quebra Total</div><div class="ov-kpi-val red">${d.percentQT||'—'}%</div></div>
        <div class="ov-kpi"><div class="ov-kpi-label">IFS Actual</div><div class="ov-kpi-val ${ifsDown?'red':'green'}">${d.ifsAtual||'—'}%</div></div>
      </div>
      <div class="progress-pill" style="margin-top:10px"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--g4);margin-top:5px">${done}/${total} artigos justificados</div>
    </div>`;
  }).join('') + '</div>';
}

window.selectStore = function(sid) {
  currentStore = sid;
  document.querySelectorAll('.store-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('sidebar-' + sid);
  if (el) el.classList.add('active');
  renderStore(sid);
};

function renderStore(sid) {
  const d    = pacData[sid];
  const area = document.getElementById('main-area');
  if (!d) { area.innerHTML = '<div class="empty"><h3>Sem dados</h3></div>'; return; }
  const total   = (d.sobras||[]).length + (d.faltas||[]).length;
  const done    = countDone(sid);
  const pct     = total > 0 ? Math.round((done/total)*100) : 0;
  const ifsDown = (d.ifsAtual||0) < (d.ifsAnterior||0);

  area.innerHTML = `
  <div class="page-title">
    <h1>${sid} — ${d.loja}</h1>
    <p>PAC ${d.pacDate} · Gerente: ${d.gerente} · Supervisor: ${d.supervisor}</p>
  </div>
  <div class="kpi-bar">
    <div class="kpi"><div class="kpi-label">Total Vendas</div><div class="kpi-value">${fmt(d.totalVendas)}</div><div class="kpi-sub">Kz</div></div>
    <div class="kpi"><div class="kpi-label">Resultado Inventário</div><div class="kpi-value red">${d.percentResult}%</div><div class="kpi-sub">${fmt(d.resultadoInv)} Kz</div></div>
    <div class="kpi"><div class="kpi-label">Quebras Conhecidas</div><div class="kpi-value red">${d.percentQC}%</div><div class="kpi-sub">${fmt(d.quebrasConhecidas)} Kz</div></div>
    <div class="kpi"><div class="kpi-label">Quebra Total</div><div class="kpi-value red">${d.percentQT}%</div><div class="kpi-sub">${fmt(d.quebraTotal)} Kz</div></div>
    <div class="kpi"><div class="kpi-label">IFS Actual</div><div class="kpi-value ${ifsDown?'red':'green'}">${d.ifsAtual}%</div><div class="kpi-sub">Anterior: ${d.ifsAnterior}%</div></div>
    <div class="kpi"><div class="kpi-label">Justificadas</div><div class="kpi-value ${pct===100?'green':pct>50?'amber':'red'}">${pct}%</div><div class="kpi-sub">${done} de ${total} artigos</div></div>
  </div>
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="status-row">
        <span class="dot ${pct===100?'dot-green':pct>0?'dot-amber':'dot-red'}"></span>
        <span class="status-text">${done===total?'Todas as justificações preenchidas':`${total-done} artigo(s) sem justificação`}</span>
      </span>
    </div>
    <div class="btn-group">
      <button class="btn-outline" onclick="exportCSV('${sid}')">⬇ Exportar CSV</button>
      <button class="btn-red"     onclick="submitPac('${sid}')">✓ Submeter PAC</button>
    </div>
  </div>
  <div class="pac-card">
    <div class="pac-header">
      <div><h2>Artigos com Sobra</h2><p>Top artigos com maior sobra em inventário</p></div>
      <span class="stat-chip sobra">+${(d.sobras||[]).length} artigos</span>
    </div>
    <div style="overflow-x:auto"><table class="art-table">
      <thead><tr><th>Material</th><th>Descrição</th><th style="text-align:right">Qtd QD</th><th style="text-align:right">Valor Actual</th><th style="text-align:right">Valor Anterior</th><th>Justificação</th></tr></thead>
      <tbody id="tbl-sobra-${sid}"></tbody>
    </table></div>
  </div>
  <div class="pac-card">
    <div class="pac-header">
      <div><h2>Artigos com Falta</h2><p>Top artigos com maior falta em inventário</p></div>
      <span class="stat-chip falta">${(d.faltas||[]).length} artigos</span>
    </div>
    <div style="overflow-x:auto"><table class="art-table">
      <thead><tr><th>Material</th><th>Descrição</th><th style="text-align:right">Qtd QD</th><th style="text-align:right">Valor Actual</th><th style="text-align:right">Valor Anterior</th><th>Justificação</th></tr></thead>
      <tbody id="tbl-falta-${sid}"></tbody>
    </table></div>
  </div>`;

  renderRows(sid, 'sobra', d.sobras||[]);
  renderRows(sid, 'falta', d.faltas||[]);
}

function renderRows(sid, type, items) {
  const tbody = document.getElementById(`tbl-${type}-${sid}`); if (!tbody) return;
  tbody.innerHTML = '';
  items.forEach(it => {
    const j       = getJust(sid, type, it.mat);
    const noteVal = j ? j.note : '';
    const saved   = !!(j && j.note && j.note.trim());
    const qcls    = it.qty > 0 ? 'qty-pos' : 'qty-neg';
    const sign    = it.qty > 0 ? '+' : '';
    const prev    = (it.valAnterior!==null&&it.valAnterior!==undefined) ? fmt(it.valAnterior) : '<span style="color:var(--g3)">NE</span>';
    const row = document.createElement('tr');
    row.innerHTML = `
      <td><div class="art-code">${it.mat}</div></td>
      <td><div class="art-name">${it.desc}</div></td>
      <td style="text-align:right"><span class="qty-badge ${qcls}">${sign}${it.qty}</span></td>
      <td style="text-align:right" class="val-cell">${fmt(it.valAtual)}</td>
      <td style="text-align:right" class="val-cell">${prev}</td>
      <td class="just-cell">
        <textarea class="just-textarea" id="txt-${sid}-${type}-${it.mat}" rows="2" placeholder="Justificação...">${noteVal}</textarea>
        <div>
          <button class="btn-save-row" onclick="saveRow('${sid}','${type}','${it.mat}')">Guardar</button>
          <span class="saved-tag" id="saved-${sid}-${type}-${it.mat}" style="display:${saved?'inline-flex':'none'}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Guardado
          </span>
        </div>
      </td>`;
    tbody.appendChild(row);
  });
}

window.saveRow = async function(sid, type, mat) {
  const txt = document.getElementById(`txt-${sid}-${type}-${mat}`); if (!txt) return;
  const note = txt.value.trim();
  const btn  = txt.parentElement.querySelector('.btn-save-row');
  if (btn) { btn.textContent='...'; btn.disabled=true; }
  await saveJustification(sid, type, mat, note);
  if (btn) { btn.textContent='Guardar'; btn.disabled=false; }
  const s = document.getElementById(`saved-${sid}-${type}-${mat}`);
  if (s) s.style.display = 'inline-flex';
  buildSidebar();
  refreshKpiBar(sid);
};

function refreshKpiBar(sid) {
  const d = pacData[sid]; if (!d) return;
  const total = (d.sobras||[]).length + (d.faltas||[]).length;
  const done  = countDone(sid);
  const pct   = Math.round((done/total)*100);
  const kpis  = document.querySelectorAll('.kpi-bar .kpi');
  if (kpis[5]) {
    const cls = pct===100?'green':pct>50?'amber':'red';
    kpis[5].querySelector('.kpi-value').className = 'kpi-value ' + cls;
    kpis[5].querySelector('.kpi-value').textContent = pct + '%';
    kpis[5].querySelector('.kpi-sub').textContent = `${done} de ${total} artigos`;
  }
  const dot = document.querySelector('.status-row .dot');
  const txt = document.querySelector('.status-row .status-text');
  if (dot) dot.className = 'dot '+(pct===100?'dot-green':pct>0?'dot-amber':'dot-red');
  if (txt) txt.textContent = done===total?'Todas as justificações preenchidas':`${total-done} artigo(s) sem justificação`;
}

window.exportCSV = function(sid) {
  const d = pacData[sid]; if (!d) return;
  const rows = [['Tipo','Material','Descrição','Qtd QD','Valor Actual','Valor Anterior','Justificação','Guardado em']];
  [...(d.sobras||[]).map(i=>({...i,tp:'Sobra'})), ...(d.faltas||[]).map(i=>({...i,tp:'Falta'}))].forEach(it => {
    const j = getJust(sid, it.tp.toLowerCase(), it.mat);
    rows.push([it.tp, it.mat, it.desc, it.qty, it.valAtual, it.valAnterior??'NE', j?j.note:'', j?j.savedAt:'']);
  });
  const csv  = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `PAC_${sid}_${(d.pacDate||'').replace(/\//g,'-')}.csv`;
  a.click();
};

window.submitPac = async function(sid) {
  const d = pacData[sid]; if (!d) return;
  const total = (d.sobras||[]).length + (d.faltas||[]).length;
  const done  = countDone(sid);
  if (done < total && !confirm(`${total-done} artigo(s) sem justificação. Submeter mesmo assim?`)) return;
  await setDoc(doc(db, 'submissoes', sid), {
    sid, loja: d.loja, pacDate: d.pacDate,
    submittedAt: new Date().toISOString(),
    totalItems: total, justified: done
  });
  alert(`PAC ${sid} submetido!\n${done}/${total} artigos justificados.`);
};

// ── INIT ──
initFirebase();
</script>
</body>
</html>
