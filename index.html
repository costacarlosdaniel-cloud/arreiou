<!DOCTYPE html>
<html lang="pt" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0070F3">
  <meta name="description" content="Karta · Retail Intelligence — Gestão operacional de supermercados hard discount">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Karta">

  <title>Karta · Retail Intelligence</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Ícones Apple -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

<!-- ============================================================
     APP LAYOUT
     ============================================================ -->
<div class="app-layout">

  <!-- ======================================================
       SIDEBAR
       ====================================================== -->
  <aside id="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <div class="logo-sq logo-sq-1"></div>
        <div class="logo-sq logo-sq-2"></div>
        <div class="logo-sq logo-sq-3"></div>
        <div class="logo-sq logo-sq-4"></div>
      </div>
      <div class="logo-text">
        <div class="logo-name">Karta</div>
        <div class="logo-sub">Retail Intelligence</div>
      </div>
    </div>

    <!-- Store selector -->
    <div class="sidebar-store-wrap">
      <select class="store-select select" style="font-size:.8rem">
        <option>A carregar lojas...</option>
      </select>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">

      <div class="nav-section-label">Principal</div>

      <button class="nav-item" data-module="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        Dashboard
      </button>

      <button class="nav-item" data-module="analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
          <polyline points="17 6 23 6 23 12"/>
        </svg>
        Análises
      </button>

      <div class="nav-section-label">Operações</div>

      <button class="nav-item" data-module="inventory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        Contagens
      </button>

      <button class="nav-item" data-module="schedules">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Escalas
      </button>

      <button class="nav-item" data-module="reviews">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Roteiro
      </button>

      <div class="nav-section-label">Sistema</div>

      <button class="nav-item" data-module="admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93l-1.41 1.41M5.34 16.66l-1.41 1.41M19.07 19.07l-1.41-1.41M5.34 7.34L3.93 5.93M21 12h-2M5 12H3M19.07 4.93A9 9 0 1 1 4.93 19.07 9 9 0 0 1 19.07 4.93z"/>
        </svg>
        Administração
      </button>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button id="btn-install" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Instalar App
      </button>
    </div>
  </aside>

  <!-- ======================================================
       MAIN WRAPPER
       ====================================================== -->
  <div class="main-wrapper">

    <!-- Header -->
    <header class="app-header">
      <button id="sidebar-toggle" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <h1 id="page-title">Dashboard</h1>

      <div class="header-actions">
        <div class="header-avatar" title="Utilizador">K</div>
      </div>
    </header>

    <!-- Main content -->
    <main id="main-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>A inicializar Karta...</p>
      </div>
    </main>
  </div>

  <!-- ======================================================
       BOTTOM NAVIGATION (Mobile)
       ====================================================== -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">

      <button class="bottom-nav-btn" data-bottom-nav="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        KPIs
      </button>

      <button class="bottom-nav-btn" data-bottom-nav="analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        </svg>
        Análises
      </button>

      <button class="bottom-nav-btn" data-bottom-nav="inventory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
        </svg>
        Contagens
      </button>

      <button class="bottom-nav-btn" data-bottom-nav="schedules">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Escalas
      </button>

      <button class="bottom-nav-btn" data-bottom-nav="admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93A9 9 0 1 1 4.93 19.07 9 9 0 0 1 19.07 4.93z"/>
        </svg>
        Admin
      </button>

    </div>
  </nav>

</div>

<!-- ======================================================
     OVERLAYS GLOBAIS
     ====================================================== -->
<div id="sidebar-overlay"></div>
<div id="toast-container"></div>
<div id="loading-overlay">
  <div class="loading-overlay-inner">
    <div class="loading-spinner loading-spinner-lg"></div>
    <p id="loading-overlay-msg">A processar...</p>
  </div>
</div>

<!-- ======================================================
     SCRIPTS
     ====================================================== -->
<script type="module" src="/app.js"></script>

</body>
</html>
