<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0070F3" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Karta · Retail Intelligence</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hdr">
    <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
    <div class="brand">Karta</div>
    <div class="divider"></div>
    <div class="subtitle">Retail Intelligence</div>
    <div class="spacer"></div>
    <button id="btnSync" class="btn primary">Atualizar Sheet</button>
    <span id="syncState" class="state"></span>
  </header>

  <main class="app-shell">
    <aside class="side">
      <input id="storeSearch" class="search" placeholder="Pesquisar loja..." />
      <nav id="storeList" class="store-list"></nav>
    </aside>

    <section class="workspace">
      <nav class="tabs" id="tabs">
        <button data-view="kpi" class="active">KPI</button>
        <button data-view="analises">Análises</button>
        <button data-view="contagens">Contagens</button>
        <button data-view="escalas">Escalas</button>
        <button data-view="supervisores">Roteiro</button>
        <button data-view="admin">Admin</button>
      </nav>

      <section id="view-kpi" class="view active"></section>
      <section id="view-analises" class="view"></section>
      <section id="view-contagens" class="view"></section>
      <section id="view-escalas" class="view"></section>
      <section id="view-supervisores" class="view"></section>
      <section id="view-admin" class="view"></section>
    </section>
  </main>

  <nav class="bottom-nav" id="bottomNav">
    <button data-view="kpi" class="active">KPI</button>
    <button data-view="analises">Análises</button>
    <button data-view="contagens">Contagens</button>
    <button data-view="escalas">Escalas</button>
    <button data-view="admin">Admin</button>
  </nav>

  <div id="toast" class="toast"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
